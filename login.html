<!doctype html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login Or Sign Up</title><link rel="stylesheet" href="styles.css"></head>
<body class="authPage">
<nav class="nav"><div class="wrap navin"><a class="brand" href="index.html"><img src="assets/logos/logo.png" alt="The Anchor Collective logo"><span>THE ANCHOR COLLECTIVE</span></a><div class="links"><a href="about.html">About</a><a href="events.html">Events</a><a href="family-resources.html">Family Resources</a><a href="podcasts.html">Podcasts</a><a class="btn primary" href="login.html">Login</a></div></div></nav>
<section class="section"><div class="wrap authGrid"><form class="form authLogin"><h2>Login</h2><p class="notice authMessage">Enter your email. If we do not find an account, we will move you to signup.</p><label>Email</label><input name="email" id="loginEmail" type="email" required><label>Password</label><input name="password" type="password" required><button class="btn green">Login</button><button class="textButton" type="button" id="showSignup">Need an account? Sign up</button></form><form class="form authSignup"><h2>Create Account</h2><p class="notice">Accounts let you RSVP, donate to causes, and use the client portal.</p><label>Full Name</label><input name="name" required><label>Email</label><input name="email" id="signupEmail" type="email" required><label>Phone</label><input name="phone"><label>Date of Birth</label><input name="dateOfBirth" type="date" required><label>Neighborhood</label><input name="neighborhood" placeholder="North End, South End, Asylum Hill..."><label>Family Role</label><select name="familyRole"><option>Father</option><option>Mother</option><option>Guardian</option><option>Mentor</option><option>Caregiver</option><option>Community Member</option></select><label>Main Interest</label><select name="interests"><option>Fathers Day</option><option>Family Resources</option><option>Podcast</option><option>Volunteering</option></select><label>Preferred Contact</label><select name="preferredContact"><option>Email</option><option>Phone</option><option>Text</option></select><label>Support Needs</label><textarea name="supportNeeds" rows="3" placeholder="Anything helpful for the team to know"></textarea><button class="btn green">Create Account</button><button class="textButton" type="button" id="showLogin">Already have an account? Login</button></form></div></section>
<script src="convex-config.js"></script>
<script src="scripts/api.js"></script>
<script src="scripts/auth.js"></script>
<script src="scripts/login.js"></script>
</body></html>
